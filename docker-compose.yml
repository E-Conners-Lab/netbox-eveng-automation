services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - netbox-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - netbox-redis:/data
    restart: unless-stopped

  netbox:
    image: netboxcommunity/netbox:v4.0
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      REDIS_CACHE_HOST: redis
      REDIS_CACHE_PORT: 6379
      REDIS_CACHE_DATABASE: 1
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      SUPERUSER_NAME: ${SUPERUSER_NAME:?SUPERUSER_NAME is required}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:?SUPERUSER_EMAIL is required}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:?SUPERUSER_PASSWORD is required}
      SUPERUSER_API_TOKEN: ${SUPERUSER_API_TOKEN:?SUPERUSER_API_TOKEN is required}
      SKIP_SUPERUSER: ${SKIP_SUPERUSER:-false}
    ports:
      - "8000:8080"
    volumes:
      - netbox-media:/opt/netbox/netbox/media
    restart: unless-stopped

  netbox-worker:
    image: netboxcommunity/netbox:v4.0
    depends_on:
      - netbox
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    command: /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker
    restart: unless-stopped

  netbox-housekeeping:
    image: netboxcommunity/netbox:v4.0
    depends_on:
      - netbox
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    command: /opt/netbox/housekeeping.sh
    restart: unless-stopped

volumes:
  netbox-media:
  netbox-postgres:
  netbox-redis:
